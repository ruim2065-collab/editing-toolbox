name: Build-APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        run: |
          SDK=$HOME/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd $SDK/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mkdir -p latest
          shopt -s dotglob
          for f in *; do [ "$f" != "latest" ] && [ "$f" != "tools.zip" ] && mv "$f" latest/; done
          yes | latest/bin/sdkmanager --sdk_root=$SDK --licenses
          latest/bin/sdkmanager --sdk_root=$SDK "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/release.keystore \
            -alias toolbox \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass toolbox2026 -keypass toolbox2026 \
            -dname "CN=Toolbox" -noprompt

      - name: Build APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleRelease --no-daemon 2>&1

      - name: Debug
        if: always()
        run: find . -name "*.apk" 2>/dev/null; ls -R android/app/build/outputs/apk/ 2>/dev/null || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: "**/*.apk"
